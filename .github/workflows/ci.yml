name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
        with: { components: "rustfmt, clippy" }
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (prod) — zero warningow
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: clippy (test-periods) — zero warningow
        run: cargo clippy -p anl_staking --all-targets --features test-periods -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - name: anl-math (prod + test-periods)
        run: |
          cargo test -p anl-math
          cargo test -p anl-math --features test-periods
      - name: core (model referencyjny)
        run: |
          cd core
          cargo test
          cargo test --features test-periods
      - name: integracja — wariant test-periods
        run: cargo test -p anl_staking --features test-periods --test integration
      - name: integracja — wariant PRODUKCYJNY (audyt #3)
        run: cargo test -p anl_staking --test integration

  release-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - name: "NEGATYWNY: mainnet + test-periods MUSI sie nie kompilowac (H-01)"
        run: |
          set +e
          OUT=$(cargo check -p anl_staking --features "network-mainnet,test-periods" 2>&1)
          CODE=$?
          set -e
          echo "$OUT" | tail -5
          if [ $CODE -eq 0 ]; then
            echo "::error::Build mainnet+test-periods SKOMPILOWAL SIE — blokada H-01 nie dziala"
            exit 1
          fi
          echo "$OUT" | grep -q "test-periods cannot be enabled together with network-mainnet" \
            || { echo "::error::Build padl, ale nie na compile_error! H-01"; exit 1; }
          echo "OK: oczekiwany sukces testu negatywnego"
      - name: "NEGATYWNY: mainnet + testnet wykluczone (asercja komunikatu — V-04)"
        run: |
          set +e
          OUT=$(cargo check -p anl_staking --features "network-mainnet,network-testnet" 2>&1)
          CODE=$?
          set -e
          echo "$OUT" | tail -5
          if [ $CODE -eq 0 ]; then
            echo "::error::Obie sieci naraz sie kompiluja"; exit 1
          fi
          echo "$OUT" | grep -q "select exactly one network feature" \
            || { echo "::error::Build padl, ale nie na compile_error! wyboru sieci"; exit 1; }
          echo "OK: oczekiwany sukces testu negatywnego"
      - name: build wariantow sieciowych
        run: |
          cargo check -p anl_staking --features network-mainnet
          cargo check -p anl_staking --features "network-testnet,test-periods"

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: taiki-e/install-action@v2
        with: { tool: "cargo-audit,cargo-deny" }
      - name: cargo audit (BLOKUJACY — V-01)
        run: cargo audit
      - name: cargo deny (BLOKUJACY, polityka z deny.toml w repo — V-01)
        run: cargo deny check advisories bans sources
