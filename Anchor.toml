[toolchain]
anchor_version = "0.30.1"

[features]
seeds = false
skip-lint = false

[programs.localnet]
anl_staking = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"

# Testnet X1 (build: scripts/build-testnet.sh; klaster przez provider.cluster)
# UWAGA: testnetowy Program ID jest EFEMERYCZNY (resety środowiska);
# źródłem prawdy jest declare_id! w lib.rs pod feature network-testnet.
[programs.testnet]
anl_staking = "6jiCawqJg5NPR26wCov15tD3HtjKVk1Ao252ZJbZYj1w"

# Mainnet: placeholder bez keypaira — do ceremonii Program ID
[programs.mainnet]
anl_staking = "CvvG4xQq1w4gYRSidZZ3CzcGcGzaD9LprYjh9XEoMbWC"

[registry]
url = "https://api.apr.dev"

[provider]
# Localnet do testów; docelowo RPC X1 Network (x1.xyz)
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.spec.ts"
